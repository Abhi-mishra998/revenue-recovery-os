name: tests

# Security note: this workflow only interpolates trusted inputs into run:
# steps (matrix.engine is a string literal from the matrix definition; no
# github.event.* values are placed into shell commands). Untrusted PR/issue
# text never flows into a script — safe per the OSS workflow-injection guide.

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  frontend:
    name: frontend (build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    env:
      # Build-time placeholder; CI doesn't hit a real backend.
      REACT_APP_BACKEND_URL: http://127.0.0.1:8765
      CI: "false"   # CRA treats CI=true as 'warnings are errors' — too strict
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: yarn
          cache-dependency-path: frontend/yarn.lock
      - name: Enable corepack + yarn classic
        run: |
          corepack enable
          corepack prepare yarn@1.22.22 --activate
      - name: Install deps
        run: yarn install --frozen-lockfile --ignore-engines
      - name: Build
        run: yarn build

  lint:
    name: lint (ruff)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt
      - name: Install ruff
        run: pip install "ruff>=0.6.0"
      - name: ruff check
        run: ruff check .
      - name: ruff format --check
        run: ruff format --check .

  pytest:
    name: pytest (engine=${{ matrix.engine }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        engine: [mongo, postgres]

    services:
      mongo:
        image: mongo:7
        ports: ["27017:27017"]
        options: >-
          --health-cmd "mongosh --quiet --eval 'db.runCommand({ping:1}).ok'"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10

      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: revora
          POSTGRES_PASSWORD: revora
          POSTGRES_DB: revora
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U revora -d revora"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10

    env:
      MONGO_URL: mongodb://localhost:27017
      DB_NAME: revora_test
      POSTGRES_URL: postgresql://revora:revora@localhost:5432/revora
      JWT_SECRET: ci-secret-do-not-use-in-prod-32chars-min-padded
      ADMIN_EMAIL: founder@bytehubble.com
      ADMIN_PASSWORD: ByteHubble@2025
      RATE_LIMIT_ENABLED: "false"
      CORS_ORIGINS: http://localhost:3000
      DB_ENGINE: ${{ matrix.engine }}
      REACT_APP_BACKEND_URL: http://127.0.0.1:8765

    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies (no private emergentintegrations)
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Apply Postgres schema (needed on both matrices — test_migration runs on mongo too)
        env:
          PGPASSWORD: revora
        run: |
          sudo apt-get update -qq && sudo apt-get install -y postgresql-client
          psql -h localhost -U revora -d revora -v ON_ERROR_STOP=1 \
            -f db/sql/0001_initial.sql

      - name: Start backend
        run: |
          uvicorn server:app --host 127.0.0.1 --port 8765 --log-level warning &
          echo $! > /tmp/uvicorn.pid
          for i in $(seq 1 30); do
            if curl -sf http://127.0.0.1:8765/api/ >/dev/null; then
              echo "backend ready after ${i}s"; break
            fi
            sleep 1
          done
          curl -s http://127.0.0.1:8765/api/

      - name: Run tests + coverage
        run: |
          pytest tests/ \
            --cov=services --cov=server \
            --cov-report=term \
            --cov-report=xml \
            --junitxml=junit.xml \
            -v

      - name: Upload coverage XML
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-${{ matrix.engine }}
          path: backend/coverage.xml

      - name: Upload junit XML
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: junit-${{ matrix.engine }}
          path: backend/junit.xml

      - name: Stop backend
        if: always()
        run: |
          kill "$(cat /tmp/uvicorn.pid)" 2>/dev/null || true
